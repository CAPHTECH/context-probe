version: "1.0"
contexts:
  - name: Delivery
    pathGlobs:
      - "src/cli.ts"
      - "src/commands.ts"
      - "src/index.ts"
    contractGlobs:
      - "src/cli.ts"
      - "src/commands.ts"
      - "src/index.ts"
  - name: Core
    pathGlobs:
      - "src/core/**"
    contractGlobs:
      - "src/core/artifacts.ts"
      - "src/core/contracts.ts"
      - "src/core/document-extractors.ts"
      - "src/core/formula.ts"
      - "src/core/history.ts"
      - "src/core/io.ts"
      - "src/core/model.ts"
      - "src/core/policy.ts"
      - "src/core/report.ts"
      - "src/core/response.ts"
      - "src/core/review.ts"
      - "src/core/scoring.ts"
      - "src/core/trace.ts"
    internalGlobs:
      - "src/core/providers.ts"
  - name: Analysis
    pathGlobs:
      - "src/analyzers/**"
    contractGlobs:
      - "src/analyzers/**"
  - name: Packs
    pathGlobs:
      - "src/packs/**"
    contractGlobs:
      - "src/packs/**"
aggregates:
  - name: CommandOrchestration
    context: Delivery
    aliases:
      - cli
      - commands
      - index
  - name: MeasurementPipeline
    context: Core
    aliases:
      - score.compute
      - domain_design
  - name: ReportGeneration
    context: Core
    aliases:
      - report.generate
  - name: ReviewQueue
    context: Core
    aliases:
      - review.list_unknowns
  - name: TraceLinkGraph
    context: Core
    aliases:
      - trace.link_model_to_code
      - trace.link_terms
  - name: HistoryLocality
    context: Core
    aliases:
      - history.compare_locality_models
      - history.analyze_persistence
  - name: ExtractionCatalog
    context: Core
    aliases:
      - doc.extract_glossary
      - doc.extract_rules
      - doc.extract_invariants
  - name: PolicyDecision
    context: Core
    aliases:
      - gate.evaluate
  - name: AnalyzerSuite
    context: Analysis
    aliases:
      - analyzers
      - analysis
  - name: PackRegistry
    context: Packs
    aliases:
      - packs
