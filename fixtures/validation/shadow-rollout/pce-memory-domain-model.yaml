      - "apps/pce-memory/src/db/**/*.ts"
      - "apps/pce-memory/src/db/schema.sql"
      - "apps/pce-memory/src/store/claims.ts"
      - "apps/pce-memory/src/store/claimLinks.ts"
      - "apps/pce-memory/src/store/entities.ts"
      - "apps/pce-memory/src/store/relations.ts"
      - "apps/pce-memory/src/store/observations.ts"
      - "apps/pce-memory/src/store/evidence.ts"
