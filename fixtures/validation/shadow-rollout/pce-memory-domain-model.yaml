version: "1.0"
contexts:
  - name: RuntimeInterfaces
    pathGlobs:
      - "apps/pce-memory/src/index.ts"
      - "apps/pce-memory/src/cli/**/*.ts"
      - "apps/pce-memory/src/client/**/*.ts"
      - "apps/pce-memory/src/daemon/**/*.ts"
      - "apps/pce-memory/src/config/**/*.ts"
      - "apps/pce-memory/src/shared/**/*.ts"
      - "apps/pce-memory/src/utils/**/*.ts"
    contractGlobs:
      - "apps/pce-memory/src/index.ts"
      - "apps/pce-memory/src/cli/**/*.ts"
      - "apps/pce-memory/src/client/**/*.ts"
      - "apps/pce-memory/src/daemon/**/*.ts"
      - "apps/pce-memory/src/config/**/*.ts"
  - name: DomainState
    pathGlobs:
      - "apps/pce-memory/src/domain/**/*.ts"
      - "apps/pce-memory/src/layer/**/*.ts"
      - "apps/pce-memory/src/state/**/*.ts"
