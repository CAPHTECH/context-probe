version: "1.0"
nodes:
  - nodeId: api
    kind: service
    isolationBoundary: edge
  - nodeId: app
    kind: service
    isolationBoundary: app
  - nodeId: worker
    kind: worker
    isolationBoundary: async
  - nodeId: db
    kind: datastore
    isolationBoundary: app
edges:
  - source: api
    target: app
    kind: sync_call
  - source: app
    target: worker
    kind: async_message
  - source: app
    target: db
    kind: runtime_dependency
