version: "1.0"
suite: "context-probe-pbt"
properties:
  - id: "formula-reference-model"
    module: "src/core/formula.ts"
    category: "reference_model"
    level: "L0"
    test: "test/pbt/formula.pbt.test.ts"
    description: "Generated arithmetic formulas match an independent AST evaluator."
  - id: "formula-whitespace-invariance"
    module: "src/core/formula.ts"
    category: "metamorphic"
    level: "L1"
    test: "test/pbt/formula.pbt.test.ts"
    description: "Arbitrary whitespace between valid tokens does not change the result."
  - id: "formula-malformed-decimal-rejection"
    module: "src/core/formula.ts"
    category: "robustness"
    level: "L2"
    test: "test/pbt/formula.pbt.test.ts"
    description: "Malformed decimal literals are rejected instead of returning NaN."
  - id: "shadow-rollout-aggregate-reference"
    module: "src/core/shadow-rollout.ts"
    category: "reference_model"
    level: "L0"
    test: "test/pbt/shadow-rollout.pbt.test.ts"
    description: "Overall and per-category aggregates match the independent reference implementation."
  - id: "shadow-rollout-zero-weight-fallback"
    module: "src/core/shadow-rollout.ts"
    category: "invariant"
    level: "L1"
    test: "test/pbt/shadow-rollout.pbt.test.ts"
    description: "Weighted average falls back to arithmetic mean when all observation weights are zero."
  - id: "history-order-invariance"
    module: "src/core/history.ts"
    category: "metamorphic"
    level: "L0"
    test: "test/pbt/history.pbt.test.ts"
    description: "Commit order does not change locality comparison results."
  - id: "history-irrelevant-file-invariance"
    module: "src/core/history.ts"
    category: "metamorphic"
    level: "L1"
    test: "test/pbt/history.pbt.test.ts"
    description: "Files outside modeled contexts do not affect history analysis."
  - id: "history-score-bounds"
    module: "src/core/history.ts"
    category: "invariant"
    level: "L0"
    test: "test/pbt/history.pbt.test.ts"
    description: "ELS and persistence candidate scores remain normalized to [0,1]."
