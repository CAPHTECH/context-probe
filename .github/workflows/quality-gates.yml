name: quality-gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Run coverage
        run: npm run test:coverage
